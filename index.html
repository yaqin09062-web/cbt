<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT Sederhana</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f4f4f4;
}
.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 600px;
    margin: auto;
}
h2 { text-align: center; }
.timer {
    text-align: right;
    font-weight: bold;
    color: red;
}
.question {
    margin-bottom: 15px;
}
button {
    width: 100%;
    padding: 10px;
    background: blue;
    color: white;
    border: none;
    border-radius: 5px;
}
input {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>CBT Sederhana</h2>

    <!-- LOGIN -->
    <div id="loginBox">
        <input type="text" id="token" placeholder="Masukkan Token Ujian">
        <button onclick="login()">Masuk</button>
    </div>

    <!-- TIMER -->
    <div class="timer" id="timer" style="display:none;">30:00</div>

    <!-- FORM -->
    <form id="quizForm" style="display:none;">
        <input type="text" id="nama" placeholder="Masukkan Nama" required><br>
    </form>

    <!-- BUTTON -->
    <button id="submitBtn" onclick="submitQuiz()" style="display:none;">Submit</button>

    <h3 id="result"></h3>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, addDoc, collection, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNESmtPeWPk8eHNeB5URH36upWMIQ7LcY",
  authDomain: "cbt-sekolah-71151.firebaseapp.com",
  projectId: "cbt-sekolah-71151",
  storageBucket: "cbt-sekolah-71151.firebasestorage.app",
  messagingSenderId: "583326728541",
  appId: "1:583326728541:web:ab60ee0d730bd85279a8b4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= TOKEN =================
const daftarToken = ["AHMAD01","SITI02","BUDI03"];

window.login = async function(){
    let token = document.getElementById("token").value.toUpperCase();

    if(!token){
        alert("Token wajib diisi!");
        return;
    }

    const tokenRef = doc(db, "token", token);
    const tokenSnap = await getDoc(tokenRef);

    if(!tokenSnap.exists()){
        alert("Token tidak ditemukan!");
        return;
    }

    let data = tokenSnap.data();

    if(data.status === "sudah"){
        alert("Token sudah digunakan!");
        return;
    }

    localStorage.setItem("tokenAktif", token);

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("quizForm").style.display = "block";
    document.getElementById("submitBtn").style.display = "block";
    document.getElementById("timer").style.display = "block";

    alert("Login berhasil!");
}

// ================= SOAL =================
const questions = [
{q:"2+2=?", o:["3","4","5","6"], a:1},
{q:"Ibukota Indonesia?", o:["Bandung","Jakarta","Surabaya","Medan"], a:1},
{q:"5x5=?", o:["10","20","25","30"], a:2},
{q:"Air berwarna?", o:["Merah","Biru","Bening","Hijau"], a:2},
{q:"Langit malam?", o:["Terang","Gelap","Putih","Hijau"], a:1},
{q:"Hewan berkaki 4?", o:["Ayam","Kucing","Burung","Ikan"], a:1},
{q:"1+9=?", o:["8","9","10","11"], a:2},
{q:"API itu?", o:["Air","Panas","Dingin","Angin"], a:1},
{q:"Matahari terbit di?", o:["Barat","Utara","Timur","Selatan"], a:2},
{q:"3x3=?", o:["6","7","8","9"], a:3}
];

questions.sort(() => Math.random() - 0.5);

const form = document.getElementById("quizForm");

questions.forEach((item, i) => {
    let div = document.createElement("div");
    div.classList.add("question");
    div.innerHTML = `<p>${i+1}. ${item.q}</p>` +
        item.o.map((opt, j) =>
            `<label><input type="radio" name="q${i}" value="${j}"> ${opt}</label><br>`
        ).join("");
    form.appendChild(div);
});

// ================= TIMER =================
let time = 1800;
const timerEl = document.getElementById("timer");

let sudahSubmit = localStorage.getItem("sudahSubmit") === "true";

const countdown = setInterval(() => {
    let m = Math.floor(time/60);
    let s = time % 60;
    timerEl.innerHTML = `${m}:${s<10?"0":""}${s}`;
    time--;

    if(time < 0){
        clearInterval(countdown);
        if(!sudahSubmit){
            submitQuiz();
        }
    }
}, 1000);

// ================= SUBMIT =================
window.submitQuiz = async function(){

    if(sudahSubmit){
        alert("Anda sudah mengerjakan ujian ini!");
        return;
    }

    let token = localStorage.getItem("tokenAktif");
    let nama = document.getElementById("nama").value;
    let score = 0;

    if(!nama){
        alert("Nama wajib diisi!");
        return;
    }

    for(let i = 0; i < questions.length; i++){
        let ans = document.querySelector(`input[name=q${i}]:checked`);
        if(!ans){
            alert("Masih ada soal yang belum dijawab!");
            return;
        }
    }

    questions.forEach((q, i) => {
        let ans = document.querySelector(`input[name=q${i}]:checked`);
        if(ans && parseInt(ans.value) === q.a){
            score++;
        }
    });

    document.getElementById("result").innerHTML =
        `Skor Anda: ${score} / ${questions.length}`;

    try {
        await addDoc(collection(db, "hasil"), {
    nama: nama,
    token: token,
    skor: score,
    waktu: new Date().toLocaleString()
});

// 🔥 PINDAHKAN KE LUAR
const tokenRef = doc(db, "token", token);

await updateDoc(tokenRef, {
    status: "sudah"
});
        sudahSubmit = true;
        localStorage.setItem("sudahSubmit", "true");
        localStorage.setItem("token_"+token, "sudah");

        document.querySelectorAll("input").forEach(el => el.disabled = true);
        document.getElementById("submitBtn").disabled = true;

        alert("Jawaban berhasil dikirim!");

    } catch (e) {
        console.error("Error:", e);
        alert("Gagal mengirim data!");
    }
}
</script>

</body>
</html>
