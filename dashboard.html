<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Guru</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}
.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 10px;
    border: 1px solid #ddd;
    text-align: center;
}
th {
    background: #007bff;
    color: white;
}
button {
    padding: 10px;
    margin: 5px;
    border: none;
    background: green;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}
#loginBox {
    max-width: 300px;
    margin: auto;
    text-align: center;
}
input {
    padding: 8px;
    margin: 5px;
    width: 100%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h3>Login Guru</h3>
    <input type="password" id="password" placeholder="Masukkan Password"><br>
    <button onclick="login()">Masuk</button>
</div>

<!-- DASHBOARD -->
<div class="container" id="dashboard" style="display:none;">
    <h2>Dashboard Hasil CBT</h2>

    <button onclick="exportExcel()">Export CSV</button>
    <button onclick="logout()">Logout</button>

    <table>
        <thead>
            <tr>
                <th>Nama</th>
                <th>Token</th>
                <th>Skor</th>
                <th>Waktu</th>
            </tr>
        </thead>
        <tbody id="dataTable"></tbody>
    </table>

    <hr>

    <!-- UPLOAD SOAL -->
    <h3>Upload Soal (CSV)</h3>
    <input type="file" id="fileSoal">
    <button onclick="uploadSoal()">Upload Soal</button>

    <hr>

    <!-- TAMBAH SISWA -->
    <h3>Tambah Siswa</h3>
    <input type="text" id="namaSiswa" placeholder="Nama Siswa">
    <input type="text" id="rombel" placeholder="Rombel">
    <button onclick="tambahSiswa()">Tambah Siswa</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import { 
    getFirestore, 
    collection, 
    onSnapshot, 
    addDoc, 
    setDoc, 
    doc 
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// ================= INIT =================
const firebaseConfig = {
  apiKey: "AIzaSyCNESmtPeWPk8eHNeB5URH36upWMIQ7LcY",
  authDomain: "cbt-sekolah-71151.firebaseapp.com",
  projectId: "cbt-sekolah-71151",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const table = document.getElementById("dataTable");
let dataSiswa = [];

// ================= LOGIN =================
window.login = function(){
    let pass = document.getElementById("password").value;

    if(pass === "guru123"){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
    } else {
        alert("Password salah!");
    }
}

// ================= LOGOUT =================
window.logout = function(){
    location.reload();
}

// ================= REALTIME DATA =================
onSnapshot(collection(db, "hasil"), (snapshot) => {
    table.innerHTML = "";
    dataSiswa = [];

    snapshot.forEach(doc => {
        let data = doc.data();
        dataSiswa.push(data);

        let row = `
        <tr>
            <td>${data.nama}</td>
            <td>${data.token}</td>
            <td>${data.skor}</td>
            <td>${data.waktu}</td>
        </tr>
        `;

        table.innerHTML += row;
    });
});

// ================= EXPORT CSV =================
window.exportExcel = function(){
    let csv = "Nama,Token,Skor,Waktu\n";

    dataSiswa.forEach(d => {
        csv += `${d.nama},${d.token},${d.skor},${d.waktu}\n`;
    });

    let blob = new Blob([csv], { type: "text/csv" });
    let url = window.URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "hasil_cbt.csv";
    a.click();
}

// ================= UPLOAD SOAL =================
window.uploadSoal = async function(){
    let file = document.getElementById("fileSoal").files[0];

    if(!file){
        alert("Pilih file dulu!");
        return;
    }

    let text = await file.text();
    let rows = text.trim().split("\n");

    for(let i = 1; i < rows.length; i++){
        let col = rows[i].split(",").map(x => x.trim());

        if(col.length < 6) continue;

        await addDoc(collection(db, "soal"), {
            soal: col[0],
            opsi: [col[1], col[2], col[3], col[4]],
            jawaban: parseInt(col[5])
        });
    }

    alert("Soal berhasil diupload!");
}

// ================= TAMBAH SISWA =================
window.tambahSiswa = async function(){
    let nama = document.getElementById("namaSiswa").value;
    let rombel = document.getElementById("rombel").value;

    if(!nama || !rombel){
        alert("Isi semua data!");
        return;
    }

    let token = nama.toUpperCase().replace(/\s/g, "").substring(0,5)
               + Date.now().toString().slice(-4);

    await addDoc(collection(db, "siswa"), {
        nama: nama,
        rombel: rombel,
        token: token
    });

    await setDoc(doc(db, "token", token), {
        status: "belum",
        rombel: rombel
    });

    alert("Siswa berhasil ditambahkan! Token: " + token);
}
</script>

</body>
</html>
